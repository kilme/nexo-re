<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexo.RE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f3f2f1; }

    #loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .brand-icon {
      width: 32px; height: 32px; background: #0078d4;
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
    }
    .brand-icon span { color: white; font-weight: 700; font-size: 14px; font-family: 'Segoe UI', sans-serif; }
    .brand-name { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; color: #323130; }
    .brand-name em { color: #0078d4; font-style: normal; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #0078d4; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-family: 'Segoe UI', sans-serif; color: #605e5c; font-size: 13px; }

    #portal { position: fixed; inset: 0; width: 100%; height: 100%; border: none; display: none; }

    #error {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; padding: 32px; text-align: center;
    }
    .error-icon { font-size: 32px; }
    .error-title { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: 600; color: #323130; }
    .error-msg { font-family: 'Segoe UI', sans-serif; font-size: 13px; color: #605e5c; max-width: 360px; }
    .retry-btn {
      margin-top: 6px; padding: 6px 20px;
      background: #0078d4; color: white; border: none;
      border-radius: 2px; cursor: pointer;
      font-size: 13px; font-family: 'Segoe UI', sans-serif;
    }
    .retry-btn:hover { background: #106ebe; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="brand">
      <div class="brand-icon"><span>N</span></div>
      <span class="brand-name">Nexo<em>.RE</em></span>
    </div>
    <div class="spinner"></div>
    <span class="loader-text">Cargando...</span>
  </div>

  <div id="error">
    <span class="error-icon">⚠️</span>
    <span class="error-title">No se pudo conectar</span>
    <span class="error-msg" id="error-msg">Ocurrió un error al cargar el portal.</span>
    <button class="retry-btn" onclick="init()">Reintentar</button>
  </div>

  <iframe id="portal" title="Nexo.RE" allow="clipboard-write; fullscreen"></iframe>

  <script>
    const PORTAL_URL = 'https://nexo-re--captura-aa00a.us-central1.hosted.app';

    function showError(msg) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('portal').style.display = 'none';
      document.getElementById('error').style.display  = 'flex';
      document.getElementById('error-msg').textContent = msg;
    }

    function init() {
      document.getElementById('error').style.display  = 'none';
      document.getElementById('portal').style.display = 'none';
      document.getElementById('loader').style.display = 'flex';

      try {
        let userId = '', userName = '', userEmail = '';

        if (typeof Xrm !== 'undefined') {
          const ctx = Xrm.Utility.getGlobalContext();
          userId    = ctx.getUserId().replace(/[{}]/g, '').toLowerCase();
          userName  = ctx.getUserName();
          userEmail = userName;
        } else {
          // Modo desarrollo: leer de query params
          const p   = new URLSearchParams(window.location.search);
          userId    = p.get('userId')    || 'dev-user';
          userName  = p.get('userName')  || 'Dev User';
          userEmail = p.get('userEmail') || '';
        }

        const url = new URL('/api/auth/dynamics', PORTAL_URL);
        url.searchParams.set('userId',    userId);
        url.searchParams.set('userName',  userName);
        url.searchParams.set('userEmail', userEmail);

        const iframe = document.getElementById('portal');
        let   loaded = false;

        iframe.onload = () => {
          if (loaded) return;
          loaded = true;
          document.getElementById('loader').style.display = 'none';
          iframe.style.display = 'block';
        };

        setTimeout(() => {
          if (!loaded) showError('El portal tardó demasiado en responder. Verifique su conexión.');
        }, 15000);

        iframe.src = url.toString();

      } catch (e) {
        showError('Error: ' + (e.message || e));
      }
    }

    init();
  </script>
</body>
</html>
